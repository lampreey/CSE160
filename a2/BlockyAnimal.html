<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title> Blocky Animal </title>
    <style>
      #webgl {
        background-image: url('https://i.imgur.com/vOp8fb8.png');
        background-size: cover;
        background-position: center;
      }
    </style>
  </head>

  <body onload="main()">
    <canvas id="webgl" width="700" height="700">
    Please use a browser that supports "canvas"
    </canvas>

    <div id="fpsCounter" style="position: absolute; top: 10px; left: 10px; color: white; font-family: monospace;">
      FPS: 0
    </div>

    <p>
    Walk <input type = "range" min = "60" max = "100" value = "70" class = "slider" id = "walkSlide">  
    <p>
    Walk2 <input type = "range" min = "80" max = "100" value = "90" class = "slider" id = "walk2Slide">  
    <p>
    Camera Angle <input type = "range" min = "-90" max = "90" value = "0" class = "slider" id = "angleSlide"> 
    <p>
    Walk Animation: 
    <button type = "button" id = "animationWalkOnButton"> ON </button>
    <button type = "button" id = "animationWalkOffButton"> OFF </button>
    <p>
    Explosion Controls:
    <button type = "button" id = "resetButton"> RESET </button>
    <p>
    Shift+Click to toggle explosion
    </p>
    
    <!-- Add this to your BlockyAnimal.html file inside the <body> -->
    <div id="explosionGif" style="position: absolute; width: 498px; height: 280px; display: none; pointer-events: none;">
      <img id="explosionGifImage" src="" style="width: 100%; height: 100%;">
    </div>


    <script src="lib/webgl-utils.js"></script>
    <script src="lib/webgl-debug.js"></script>
    <script src="lib/cuon-utils.js"></script>
    <script src="lib/cuon-matrix.js"></script>
    <script src="Triangle.js"></script>
    <script src="Cube.js"></script>
    <script src="Octahedron.js"></script>
    <script src="BlockyAnimal.js"></script>
  </body>
</html>
