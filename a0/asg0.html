<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Draw a blue rectangle (canvas version)</title>
  </head>

  <body onload="main()">
    <label>William Qiu</label>
    <br/>
    <label>whqiu@ucsc.edu</label>
    <br/>

    <canvas id="example" width="400" height="400">
      Please use a browser that supports "canvas"
    </canvas>
    <script src="asg0.js"></script>
    <script src="lib/cuon-matrix-cse160.js"></script>

    <br/>

    <label>v1 X:</label>
    <input id = "v1x" type = "text" value = ""/>
    <label>Y:</label>
    <input id = "v1y" type = "text" value = ""/>

    <br/>

    <label>v2 X:</label>
    <input id = "v2x" type = "text" value = ""/>
    <label>Y:</label>
    <input id = "v2y" type = "text" value = ""/>

    <br/>

    <input type = "button" value = "Draw" onclick = "handleDrawEvent()">

    <br/>
    <br/>

    <label for="operations">Operation:</label>

    <select id="operations">
        <option value="add">Add</option>
        <option value="sub">Sub</option>
        <option value="div">Divide</option>
        <option value="mult">Multiply</option>
        <option value="mag">Magnitude</option>
        <option value="norm">Normalize</option>
        <option value="angle">Angle Between</option>
        <option value="area">Area</option>
    </select>
    <label for="Operations"> Scalar:</label>
    <input type="text" id="scalar" name="scalar">

    <br>

    <input type = "button" value = "Draw" onclick = "handleDrawEventOperation()">

    <br/>

</html>
